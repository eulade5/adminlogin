<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazing Tools Admin</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="login-screen" class="center-screen">
<div class="card">
<h1>Admin Login</h1>

<form id="login-form">
<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>

<button type="submit">Sign In</button>

<p id="login-error"></p>
</form>
</div>
</div>

<div id="dashboard" style="display:none;">
<header>
<h1>Amazing Tools Admin</h1>

<div>
<span id="admin-email"></span>
<button id="logout-btn">Logout</button>
</div>
</header>

<main>

<section class="card">
<h2>Add Product</h2>

<form id="product-form">

<input id="product-name" placeholder="Product Name" required>
<input id="product-category" placeholder="Category" required>
<input id="product-image" placeholder="Image URL">

<textarea id="product-description" placeholder="Description"></textarea>

<button type="submit">Save Product</button>

</form>
</section>

<section class="card">
<h2>Products</h2>

<div id="products-list"></div>

</section>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/admin.js"></script>

</body>
</html>
